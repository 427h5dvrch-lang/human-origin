name: Build Windows Sidecars

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-sidecars-windows.yml"
      - "src/publisher/**"
      - "src/converter/**"

permissions:
  contents: read

jobs:
  build-windows-sidecars:
    name: Build publisher and converter for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Build publisher sidecar
        shell: pwsh
        run: |
          cargo build --manifest-path src/publisher/Cargo.toml --release

      - name: Build converter sidecar
        shell: pwsh
        run: |
          cargo build --manifest-path src/converter/Cargo.toml --release

      - name: Prepare Windows sidecar artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-sidecars | Out-Null

          Copy-Item `
            src/publisher/target/release/humanorigin-publisher.exe `
            dist-sidecars/humanorigin-publisher-x86_64-pc-windows-msvc.exe

          Copy-Item `
            src/converter/target/release/humanorigin-converter.exe `
            dist-sidecars/humanorigin-converter-x86_64-pc-windows-msvc.exe

          Get-ChildItem dist-sidecars | Format-Table Name, Length

      - name: Upload Windows sidecars
        uses: actions/upload-artifact@v4
        with:
          name: humanorigin-windows-sidecars
          path: dist-sidecars/*
