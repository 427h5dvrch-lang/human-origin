name: Build Windows Sidecars

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-sidecars-windows.yml"
      - "src/publisher/**"
      - "src/converter/**"

permissions:
  contents: write

jobs:
  build-windows-sidecars:
    name: Build publisher and converter for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain
        shell: pwsh
        run: |
          rustc --version
          cargo --version

      - name: Build publisher sidecar
        shell: pwsh
        run: |
          cargo build --manifest-path src/publisher/Cargo.toml --release

      - name: Build converter sidecar
        shell: pwsh
        run: |
          cargo build --manifest-path src/converter/Cargo.toml --release

      - name: Copy Windows sidecars into Tauri binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null

          Copy-Item `
            src/publisher/target/release/humanorigin-publisher.exe `
            src-tauri/binaries/humanorigin-publisher-x86_64-pc-windows-msvc.exe `
            -Force

          Copy-Item `
            src/converter/target/release/humanorigin-converter.exe `
            src-tauri/binaries/humanorigin-converter-x86_64-pc-windows-msvc.exe `
            -Force

          Get-ChildItem src-tauri/binaries | Format-Table Name, Length

      - name: Commit Windows sidecars
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short src-tauri/binaries

          git add `
            src-tauri/binaries/humanorigin-publisher-x86_64-pc-windows-msvc.exe `
            src-tauri/binaries/humanorigin-converter-x86_64-pc-windows-msvc.exe

          git diff --cached --stat

          if (git diff --cached --quiet) {
            Write-Host "No sidecar changes to commit."
          } else {
            git commit -m "Add Windows sidecar binaries"
            git push
          }

      - name: Upload Windows sidecars artifact
        uses: actions/upload-artifact@v4
        with:
          name: humanorigin-windows-sidecars
          path: |
            src-tauri/binaries/humanorigin-publisher-x86_64-pc-windows-msvc.exe
            src-tauri/binaries/humanorigin-converter-x86_64-pc-windows-msvc.exe
