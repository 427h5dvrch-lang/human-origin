name: Release HumanOrigin

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        # ON REMET WINDOWS ET MAC !
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (NPM)
        run: npm install

      # Décodage de la clé App Store Connect (.p8) vers un fichier temporaire
      # éphémère du runner. Le secret n'est jamais imprimé ; le .p8 n'est jamais committé.
      - name: Prepare Apple API key (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          data = os.environ["APPLE_API_KEY_P8_BASE64"]
          out = Path(os.environ["RUNNER_TEMP"]) / "AuthKey.p8"
          out.write_bytes(base64.b64decode(data))
          out.chmod(0o600)
          PY

      # 🚀 CONSTRUCTION, SIGNATURE DEVELOPER ID, NOTARISATION ET RELEASE
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater (signature des artefacts de mise à jour)
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Signature Developer ID (inchangée)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarisation via App Store Connect API key — macOS uniquement (vide ailleurs)
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ matrix.platform == 'macos-latest' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "HumanOrigin v__VERSION__"
          releaseBody: "Release signed (Developer ID) and notarized."
          releaseDraft: true
          prerelease: true

      # Tauri staple le .app mais pas le .dmg, et tauri-action a déjà uploadé le
      # .dmg non staplé : on notarise + staple le .dmg puis on remplace l'asset.
      - name: Notarize and staple DMG (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').package.version")
          echo "DMG: $DMG"
          echo "Version: $VERSION"
          xcrun notarytool submit "$DMG" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG"
          gh release upload "v$VERSION" "$DMG" --clobber

      # Vérification post-build : échoue si Gatekeeper n'accepte pas l'app
      # (notarisation absente) ou si le DMG n'est pas staplé.
      - name: Verify macOS notarization (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          APP=$(ls -d src-tauri/target/release/bundle/macos/*.app | head -n1)
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          echo "App: $APP"
          echo "DMG: $DMG"
          spctl -a -vvv --type exec "$APP"
          xcrun stapler validate "$DMG"
