name: Release HumanOrigin
permissions:
  contents: write
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install

      # ÉTAPE 1 : On construit l'app SANS LES IDENTIFIANTS APPLE
      # Si tu vois "Notarizing" dans les logs ici, c'est que ce fichier n'est pas pris en compte !
      - name: Build App (NO NOTARIZATION)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # PAS D'APPLE ID ICI = PAS DE NOTARISATION AUTOMATIQUE
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.run_number }}
          releaseName: "HumanOrigin v${{ github.run_number }}"
          releaseDraft: true
          prerelease: true

      # ÉTAPE 2 : On compresse l'app pour Apple
      - name: 📦 Zip Application
        run: |
          cd src-tauri/target/release/bundle/macos
          /usr/bin/ditto -c -k --keepParent HumanOrigin.app HumanOrigin.zip

      # ÉTAPE 3 : On envoie nous-mêmes (C'est ici qu'on verra la vraie erreur)
      - name: 🍎 Manual Notarization
        run: |
          echo "Lancement manuel de la notarisation..."
          xcrun notarytool submit src-tauri/target/release/bundle/macos/HumanOrigin.zip --apple-id "dazeas.philippe@gmail.com" --password "${{ secrets.APPLE_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --wait
        env:
          APPLE_ID: "dazeas.philippe@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}